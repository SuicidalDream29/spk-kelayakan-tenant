events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream api { server api:8000; }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;

    server {
        listen 80;

        # Security headers
        add_header X-Frame-Options           "DENY"                            always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-XSS-Protection          "1; mode=block"                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"   always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';" always;

        # Static files
        location ~* \.(html|css|js|ico|png|jpg|svg|woff2?)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # openapi.json & redoc
        location ~ ^/(openapi\.json|redoc) {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth — strict rate limit (5 req/min, burst 3)
        location ~ ^/(auth)(/|$) {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # API endpoints — general rate limit (60 req/min)
        location ~ ^/(kriteria|tenants|topsis|laporan|docs|openapi)(/|$) {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
