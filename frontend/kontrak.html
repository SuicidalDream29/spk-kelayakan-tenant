<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilai Kontrak — SPK Kelayakan Tenant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-title">SPK Kelayakan Tenant</div>
    <div class="brand-sub">Metode TOPSIS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/kriteria.html" class="nav-item"><i class="bi bi-sliders"></i> Kriteria</a>
    <a href="/tenants.html" class="nav-item"><i class="bi bi-people"></i> Tenant</a>
    <a href="/kontrak.html" class="nav-item"><i class="bi bi-table"></i> Nilai Kontrak</a>
    <a href="/topsis.html" class="nav-item"><i class="bi bi-bar-chart-steps"></i> TOPSIS & Ranking</a>
  </nav>
  <div class="sidebar-footer">v1.0.0 &mdash; SPK System</div>
</aside>

<div class="main">
  <header class="topbar">
    <span class="topbar-title">Nilai Kontrak Tenant</span>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" id="btnRefresh">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
    </div>
  </header>
  <div class="content">

    <!-- Summary cards -->
    <div class="stats-grid" id="summaryCards" style="margin-bottom:24px"></div>

    <div class="card">
      <div class="card-header">
        <span class="card-header-title">Matriks Nilai per Tenant</span>
        <span style="font-size:12px;color:#94a3b8" id="lastUpdated"></span>
      </div>
      <div class="table-toolbar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="searchInput" placeholder="Cari nama tenant...">
        </div>
        <span class="table-info" id="tableInfo"></span>
      </div>
      <div class="table-wrap">
        <table id="matrixTable">
          <thead id="matrixHead"></thead>
          <tbody id="matrixBody">
            <tr><td colspan="3"><div class="empty-state"><span class="spinner"></span></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Modal Edit Nilai -->
<div class="modal-overlay" id="modalNilai">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <span class="modal-title">Edit Nilai Kriteria</span>
        <div style="font-size:12px;color:#64748b;margin-top:2px" id="nilaiTenantNama"></div>
      </div>
      <button class="modal-close" onclick="closeModal('modalNilai')">×</button>
    </div>
    <form id="formNilai">
      <div class="modal-body" id="nilaiFields"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('modalNilai')">Batal</button>
        <button type="submit" class="btn btn-primary" id="btnSubmitNilai">Simpan Nilai</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/kontrak.js"></script>
</body>
</html>
