<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SPK Kelayakan Tenant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<button class="hamburger" id="hamburger" aria-label="Menu"><i class="bi bi-list"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏢</div>
    <div class="brand-title">SPK Kelayakan Tenant</div>
    <div class="brand-sub">Metode TOPSIS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/kriteria.html" class="nav-item"><i class="bi bi-sliders"></i> Kriteria</a>
    <a href="/tenants.html" class="nav-item"><i class="bi bi-people"></i> Tenant</a>
    <a href="/kontrak.html" class="nav-item"><i class="bi bi-table"></i> Nilai Kontrak</a>
    <a href="/topsis.html" class="nav-item"><i class="bi bi-bar-chart-steps"></i> TOPSIS & Ranking</a>
  </nav>
  <div class="sidebar-footer" id="sidebarFooter">v1.0.0 &mdash; SPK System</div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="greetingDate"></div>
      </div>
    </div>
    <div class="topbar-actions">
      <a href="/topsis.html" class="btn btn-primary btn-sm"><i class="bi bi-calculator"></i> Hitung TOPSIS</a>
    </div>
  </header>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon indigo"><i class="bi bi-sliders"></i></div>
        <div class="stat-info">
          <div class="stat-label">Total Kriteria</div>
          <div class="stat-value" id="totalKriteria"><span class="spinner"></span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><i class="bi bi-people"></i></div>
        <div class="stat-info">
          <div class="stat-label">Total Tenant</div>
          <div class="stat-value" id="totalTenant"><span class="spinner"></span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="bi bi-patch-check"></i></div>
        <div class="stat-info">
          <div class="stat-label">Tenant Layak</div>
          <div class="stat-value" id="totalLayak"><span class="spinner"></span></div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="bi bi-x-octagon"></i></div>
        <div class="stat-info">
          <div class="stat-label">Tidak Layak</div>
          <div class="stat-value" id="totalTidak"><span class="spinner"></span></div>
        </div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-header-title"><i class="bi bi-trophy" style="color:#f59e0b"></i> Ranking Terakhir</span>
          <a href="/topsis.html" class="btn btn-ghost btn-sm">Lihat Semua <i class="bi bi-arrow-right"></i></a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Nama Tenant</th><th>NIK</th><th>Nilai Preferensi</th><th>Status</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-header-title"><i class="bi bi-pie-chart" style="color:var(--accent)"></i> Distribusi Status</span>
        </div>
        <div class="chart-wrap" style="display:flex;flex-direction:column;align-items:center;padding:24px 20px">
          <canvas id="chartDonut" width="240" height="240" style="max-width:220px;max-height:220px"></canvas>
          <div id="chartLegend" style="margin-top:20px;display:flex;gap:20px;font-size:13px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
