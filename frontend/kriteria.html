<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kriteria — SPK Kelayakan Tenant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<button class="hamburger" id="hamburger"><i class="bi bi-list"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏢</div>
    <div class="brand-title">SPK Kelayakan Tenant</div>
    <div class="brand-sub">Metode TOPSIS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/kriteria.html" class="nav-item"><i class="bi bi-sliders"></i> Kriteria</a>
    <a href="/tenants.html" class="nav-item"><i class="bi bi-people"></i> Tenant</a>
    <a href="/kontrak.html" class="nav-item"><i class="bi bi-table"></i> Nilai Kontrak</a>
    <a href="/topsis.html" class="nav-item"><i class="bi bi-bar-chart-steps"></i> TOPSIS & Ranking</a>
  </nav>
  <div class="sidebar-footer" id="sidebarFooter">v1.0.0 &mdash; SPK System</div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Master Kriteria</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" id="btnTambahKriteria">
        <i class="bi bi-plus-lg"></i> Tambah Kriteria
      </button>
    </div>
  </header>
  <div class="content">
    <div class="alert-info">
      <i class="bi bi-info-circle"></i>
      Total bobot semua kriteria sebaiknya berjumlah 1.0 untuk hasil TOPSIS yang optimal.
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-header-title">Daftar Kriteria</span>
        <span id="bobotTotal" style="font-size:13px;color:var(--text-3)"></span>
      </div>
      <div class="table-toolbar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="searchInput" placeholder="Cari kriteria...">
        </div>
        <span class="table-info" id="tableInfo"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="id">ID</th>
              <th data-col="nama">Nama Kriteria</th>
              <th data-col="bobot">Bobot</th>
              <th data-col="jenis">Jenis</th>
              <th style="width:100px">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody"><tr><td colspan="5"><div class="empty-state"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalKriteria">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Tambah Kriteria</span>
      <button class="modal-close" data-close-modal="modalKriteria">×</button>
    </div>
    <form id="form">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nama Kriteria</label>
          <input type="text" id="nama" class="form-control" placeholder="cth: Penghasilan per Bulan" required>
        </div>
        <div class="form-group">
          <label class="form-label">Bobot <span style="color:var(--text-3);font-weight:400">(0.01 – 1.00)</span></label>
          <input type="number" id="bobot" class="form-control" step="0.01" min="0.01" max="1" placeholder="0.25" required>
        </div>
        <div class="form-group">
          <label class="form-label">Jenis Kriteria</label>
          <select id="jenis" class="form-select">
            <option value="benefit">Benefit — makin besar nilainya makin baik</option>
            <option value="cost">Cost — makin kecil nilainya makin baik</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close-modal="modalKriteria">Batal</button>
        <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/kriteria.js"></script>
</body>
</html>
