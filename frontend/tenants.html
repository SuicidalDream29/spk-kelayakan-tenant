<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant — SPK Kelayakan Tenant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<button class="hamburger" id="hamburger"><i class="bi bi-list"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏢</div>
    <div class="brand-title">SPK Kelayakan Tenant</div>
    <div class="brand-sub">Metode TOPSIS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/kriteria.html" class="nav-item"><i class="bi bi-sliders"></i> Kriteria</a>
    <a href="/tenants.html" class="nav-item"><i class="bi bi-people"></i> Tenant</a>
    <a href="/kontrak.html" class="nav-item"><i class="bi bi-table"></i> Nilai Kontrak</a>
    <a href="/topsis.html" class="nav-item"><i class="bi bi-bar-chart-steps"></i> TOPSIS & Ranking</a>
  </nav>
  <div class="sidebar-footer" id="sidebarFooter">v1.0.0 &mdash; SPK System</div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Data Tenant</div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="openModal('modalTenant'); resetForm()">
        <i class="bi bi-plus-lg"></i> Tambah Tenant
      </button>
    </div>
  </header>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <span class="card-header-title">Daftar Tenant</span>
      </div>
      <div class="table-toolbar">
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="searchInput" placeholder="Cari nama, NIK, alamat...">
        </div>
        <span class="table-info" id="tableInfo"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="id">ID</th>
              <th data-col="nama">Nama</th>
              <th data-col="nik">NIK</th>
              <th data-col="no_telp">No. Telepon</th>
              <th data-col="alamat">Alamat</th>
              <th data-col="nilai_lengkap">Status Nilai</th>
              <th style="width:120px">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody"><tr><td colspan="7"><div class="empty-state"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalTenant">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Tambah Tenant</span>
      <button class="modal-close" onclick="closeModal('modalTenant')">×</button>
    </div>
    <form id="formTenant" onsubmit="submitTenant(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="nama" class="form-control" placeholder="Nama lengkap tenant" required>
        </div>
        <div class="form-group">
          <label class="form-label">NIK</label>
          <input type="text" id="nik" class="form-control" maxlength="16" placeholder="16 digit NIK" required>
        </div>
        <div class="form-group">
          <label class="form-label">No. Telepon</label>
          <input type="text" id="no_telp" class="form-control" placeholder="cth: 081234567890" required>
        </div>
        <div class="form-group">
          <label class="form-label">Alamat</label>
          <textarea id="alamat" class="form-control" rows="2" placeholder="Alamat lengkap" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('modalTenant')">Batal</button>
        <button type="submit" class="btn btn-primary" id="btnSubmitTenant">Simpan</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modalNilai">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <span class="modal-title">Input Nilai Kriteria</span>
        <div style="font-size:12px;color:var(--text-3);margin-top:2px" id="nilaiTenantNama"></div>
      </div>
      <button class="modal-close" onclick="closeModal('modalNilai')">×</button>
    </div>
    <form id="formNilai">
      <div class="modal-body" id="nilaiFields"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('modalNilai')">Batal</button>
        <button type="submit" class="btn btn-primary" id="btnSubmitNilai">Simpan Nilai</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/tenants.js"></script>
<script>
document.getElementById("hamburger").onclick = () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
};
document.getElementById("sidebarOverlay").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
};
</script>
</body>
</html>
