<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOPSIS — SPK Kelayakan Tenant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-title">SPK Kelayakan Tenant</div>
    <div class="brand-sub">Metode TOPSIS</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/kriteria.html" class="nav-item"><i class="bi bi-sliders"></i> Kriteria</a>
    <a href="/tenants.html" class="nav-item"><i class="bi bi-people"></i> Tenant</a>
    <a href="/topsis.html" class="nav-item"><i class="bi bi-bar-chart-steps"></i> TOPSIS & Ranking</a>
  </nav>
  <div class="sidebar-footer">v1.0.0 &mdash; SPK System</div>
</aside>

<div class="main">
  <header class="topbar">
    <span class="topbar-title">TOPSIS & Ranking</span>
    <div class="topbar-actions">
      <button id="btnHitung" class="btn btn-primary btn-sm" onclick="hitung()">
        <i class="bi bi-calculator"></i> Hitung TOPSIS
      </button>
      <button id="btnPDF" class="btn btn-success btn-sm" onclick="window.open('/laporan/pdf','_blank')">
        <i class="bi bi-file-earmark-pdf"></i> Download PDF
      </button>
    </div>
  </header>
  <div class="content">
    <div class="alert-info">
      <i class="bi bi-info-circle"></i>
      Pastikan semua tenant sudah diinput nilainya. Kalkulasi berjalan di background — hasil akan muncul otomatis.
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-header-title"><i class="bi bi-trophy" style="color:#f59e0b"></i> &nbsp;Hasil Perangkingan</span>
        <span id="lastCalc" style="font-size:12px;color:#94a3b8"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Ranking</th><th>Nama Tenant</th><th>NIK</th><th>Nilai Preferensi</th><th>Status</th></tr>
          </thead>
          <tbody id="tbody"><tr><td colspan="5"><div class="empty-state"><span class="spinner"></span></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/topsis.js"></script>
</body>
</html>
